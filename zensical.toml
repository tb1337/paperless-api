[project]

site_name = "pypaperless"
site_description = "Little async API client for paperless(-ngx)."
site_author = "Tobias Schulz"
site_url = "https://tb1337.github.io/paperless-api/"

copyright = "Copyright &copy; 2024 - 2026 Tobias Schulz"

repo_url = "https://github.com/tb1337/paperless-api"
repo_name = "tb1337/paperless-api"

edit_uri = "blob/main/docs/"

nav = [
  "index.md",
  { "Getting started" = "quickstart.md" },
  { "Session management" = "session.md" },
  { "Concepts" = [
    { "Documents" = "documents.md" },
    { "Custom Fields" = "custom_fields.md" },
    { "Permissions" = "permissions.md" },
  ]},
  { "Resources" = [
    { "Overview" = "resources.md" },
    { "Config" = "resources/config.md" },
    { "Correspondents" = "resources/correspondents.md" },
    { "Custom Fields" = "resources/custom_fields.md" },
    { "Document Types" = "resources/document_types.md" },
    { "Documents" = "resources/documents.md" },
    { "Groups" = "resources/groups.md" },
    { "Mail Accounts" = "resources/mail_accounts.md" },
    { "Mail Rules" = "resources/mail_rules.md" },
    { "Processed Mail" = "resources/processed_mail.md" },
    { "Remote Version" = "resources/remote_version.md" },
    { "Saved Views" = "resources/saved_views.md" },
    { "Share Links" = "resources/share_links.md" },
    { "Statistics" = "resources/statistics.md" },
    { "Status" = "resources/status.md" },
    { "Storage Paths" = "resources/storage_paths.md" },
    { "Tags" = "resources/tags.md" },
    { "Tasks" = "resources/tasks.md" },
    { "Users" = "resources/users.md" },
    { "Workflows" = "resources/workflows.md" },
  ]},
  { "Reference" = "exceptions.md" },
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]

language = "en"

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "navigation.footer",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]
logo = "lucide/file-text"

[project.theme.font]
text = "Roboto"
code = "Roboto Mono"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

# ----------------------------------------------------------------------------
# Social links
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/tb1337/paperless-api"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.def_list]
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.tilde]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
